<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Webbs Memorial Orphanage</title>
    <meta
      name="description"
      content="Admin panel for viewing contact enquiries sent to Webbs Memorial Orphanage."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <main class="admin-main">
      <section class="section admin-section">
        <div class="section-heading">
          <p class="eyebrow">Admin Panel</p>
          <h1 class="admin-title">Contact Form Messages</h1>
        </div>
        <p class="about-text">
          This dashboard shows the latest messages submitted through the website contact form.
        </p>
        <div class="admin-actions">
          <a class="button secondary" href="/">Back to Website</a>
          <button id="refresh-messages" class="button primary" type="button">Refresh</button>
        </div>
        <div id="admin-status" class="form-status" aria-live="polite"></div>
        <div id="message-list" class="message-list"></div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
